<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1f2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0f1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="intelGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0071c5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00aeef;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="aiGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bgGradient)"/>
  
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#aiGradient)" stroke-width="3" opacity="0.3"/>
  
  <!-- Intel Logo Shape - Stylized -->
  <g transform="translate(256, 256)" filter="url(#shadow)">
    <!-- Central AI brain shape -->
    <path d="M-80,-60 Q-100,-40 -100,0 Q-100,40 -80,60 Q-60,80 0,80 Q60,80 80,60 Q100,40 100,0 Q100,-40 80,-60 Q60,-80 0,-80 Q-60,-80 -80,-60 Z" 
          fill="url(#intelGradient)" opacity="0.9"/>
    
    <!-- Neural network nodes -->
    <circle cx="-50" cy="-30" r="12" fill="#fff" opacity="0.9"/>
    <circle cx="50" cy="-30" r="12" fill="#fff" opacity="0.9"/>
    <circle cx="-50" cy="30" r="12" fill="#fff" opacity="0.9"/>
    <circle cx="50" cy="30" r="12" fill="#fff" opacity="0.9"/>
    <circle cx="0" cy="0" r="16" fill="#fff" opacity="1"/>
    
    <!-- Neural connections -->
    <line x1="-50" y1="-30" x2="0" y2="0" stroke="#fff" stroke-width="3" opacity="0.6"/>
    <line x1="50" y1="-30" x2="0" y2="0" stroke="#fff" stroke-width="3" opacity="0.6"/>
    <line x1="-50" y1="30" x2="0" y2="0" stroke="#fff" stroke-width="3" opacity="0.6"/>
    <line x1="50" y1="30" x2="0" y2="0" stroke="#fff" stroke-width="3" opacity="0.6"/>
    <line x1="-50" y1="-30" x2="50" y2="-30" stroke="#fff" stroke-width="2" opacity="0.4"/>
    <line x1="-50" y1="30" x2="50" y2="30" stroke="#fff" stroke-width="2" opacity="0.4"/>
  </g>
  
  <!-- Intel text indicator -->
  <g transform="translate(256, 420)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="32" font-weight="bold" 
          fill="url(#intelGradient)" text-anchor="middle" filter="url(#glow)">INTEL</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="20" fill="url(#aiGradient)" opacity="0.2"/>
  <circle cx="412" cy="100" r="15" fill="url(#aiGradient)" opacity="0.15"/>
  <circle cx="412" cy="412" r="25" fill="url(#intelGradient)" opacity="0.2"/>
  <circle cx="100" cy="412" r="18" fill="url(#intelGradient)" opacity="0.15"/>
  
  <!-- Speed lines -->
  <g opacity="0.3">
    <line x1="60" y1="256" x2="100" y2="256" stroke="url(#aiGradient)" stroke-width="2" stroke-linecap="round"/>
    <line x1="412" y1="256" x2="452" y2="256" stroke="url(#aiGradient)" stroke-width="2" stroke-linecap="round"/>
    <line x1="256" y1="60" x2="256" y2="100" stroke="url(#aiGradient)" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
